<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Tradutor de Manga</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #2a2a40);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      background: #111;
      padding: 30px;
      border-radius: 12px;
      width: 90%;
      max-width: 900px;
      box-shadow: 0 0 30px rgba(0,0,0,0.6);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .upload {
      text-align: center;
      margin-bottom: 20px;
    }

    input[type="file"] {
      margin-bottom: 10px;
    }

    button {
      background: #6c63ff;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      color: white;
      font-size: 16px;
      cursor: pointer;
      margin: 5px;
    }

    button:disabled {
      background: #555;
      cursor: not-allowed;
    }

    .images {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: #1b1b2e;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }

    img {
      max-width: 100%;
      border-radius: 8px;
      margin-top: 10px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🈶 Tradutor de Manga</h1>

  <div class="upload">
<input type="file" id="file" accept="image/*" hidden onchange="mostrarPreviewOriginal(this.files[0])">

<button onclick="document.getElementById('file').click()">
  Escolher imagem
</button>

<button id="btnTraduzir" onclick="enviar()">Traduzir</button>
<button id="btnDownload" class="hidden" onclick="baixar()">Download</button>
  </div>

  <div class="images">
    <div class="card">
      <h3>Original</h3>
      <img id="previewOriginal">
    </div>

    <div class="card">
      <h3>Traduzida</h3>
      <img id="previewResultado">
    </div>
  </div>
</div>

<script>
let imagemFinalURL = null

function mostrarPreviewOriginal(file) {
  const img = document.getElementById("previewOriginal")
  img.src = URL.createObjectURL(file)
}

async function enviar() {
  const input = document.getElementById("file")
  const btn = document.getElementById("btnTraduzir")
  const btnDownload = document.getElementById("btnDownload")

  if (!input.files.length) {
    alert("Selecione uma imagem")
    return
  }

  mostrarPreviewOriginal(input.files[0])

  btn.disabled = true
  btn.innerText = "Traduzindo..."

  const formData = new FormData()
  formData.append("file", input.files[0])

  const response = await fetch("https://site-tradutor-de-manga.onrender.com", {
    method: "POST",
    body: formData
  })

  if (!response.ok) {
    alert("Erro ao traduzir")
    btn.disabled = false
    btn.innerText = "Traduzir"
    return
  }

  const blob = await response.blob()
  imagemFinalURL = URL.createObjectURL(blob)

  document.getElementById("previewResultado").src = imagemFinalURL
  btnDownload.classList.remove("hidden")

  btn.disabled = false
  btn.innerText = "Traduzir"
}

function baixar() {
  const a = document.createElement("a")
  a.href = imagemFinalURL
  a.download = "manga_traduzido.jpg"
  document.body.appendChild(a)
  a.click()
  document.body.removeChild(a)
}
</script>

</body>
</html>
